  <rect x="72" y="25" width="3" height="4" fill="#dee2e6" />
  <rect x="77" y="25" width="3" height="4" fill="#adb5bd" />
  <rect x="82" y="25" width="3" height="4" fill="#dee2e6" />
  <rect x="87" y="25" width="3" height="4" fill="#adb5bd" />

