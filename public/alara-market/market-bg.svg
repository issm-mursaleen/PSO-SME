<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 48" width="96" height="48" shape-rendering="crispEdges">
  <defs>
    <pattern id="floorTile" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#ffffff" />
      <rect width="2" height="2" fill="#dee2e6" />
      <rect x="2" y="2" width="2" height="2" fill="#dee2e6" />
    </pattern>
  </defs>

  <!-- Backdrop -->
  <rect x="0" y="0" width="96" height="48" fill="#ffffff" />

  <!-- Distant silhouettes -->
  <rect x="4" y="3" width="6" height="6" fill="#dee2e6" />
  <rect x="13" y="2" width="5" height="7" fill="#dee2e6" />
  <rect x="40" y="3" width="7" height="6" fill="#dee2e6" />
