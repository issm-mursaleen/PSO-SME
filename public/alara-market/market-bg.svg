  <rect x="5" y="33" width="18" height="5" fill="#6c757d" />
  <rect x="5" y="33" width="18" height="1" fill="#212529" />
  <rect x="6" y="28" width="4" height="5" fill="#adb5bd" />
  <rect x="6" y="31" width="4" height="2" fill="#495057" />
