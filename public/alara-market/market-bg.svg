  <rect x="80" y="3" width="6" height="6" fill="#dee2e6" />
  <rect x="6" y="5" width="1" height="1" fill="#adb5bd" />
  <rect x="15" y="4" width="1" height="1" fill="#adb5bd" />
  <rect x="43" y="5" width="1" height="1" fill="#adb5bd" />
  <rect x="64" y="4" width="1" height="1" fill="#adb5bd" />
  <rect x="82" y="5" width="1" height="1" fill="#adb5bd" />

  <!-- Continuous checkered pavement -->
  <rect x="0" y="38" width="96" height="10" fill="url(#floorTile)" />
  <rect x="0" y="38" width="96" height="1" fill="#adb5bd" />

  <!-- ░░ STALL — GRAINS ░░ -->
