<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 18" width="144" height="18" shape-rendering="crispEdges">
  <!-- Cat faces right (toward oncoming market). 6 walk-cycle frames, 24x18 each.
       Head/body stay put; only legs, tail and a body pixel shift per frame. -->

  <!-- FRAME 1 -->
  <g>
    <rect x="2" y="5" width="2" height="2" fill="#000000" />
    <rect x="1" y="3" width="2" height="2" fill="#000000" />
    <rect x="6" y="7" width="10" height="4" fill="#343a40" />
    <rect x="7" y="8" width="8" height="2" fill="#000000" />
    <rect x="15" y="4" width="5" height="5" fill="#343a40" />
    <rect x="16" y="5" width="3" height="3" fill="#000000" />
    <rect x="15" y="3" width="1" height="1" fill="#343a40" />
    <rect x="19" y="3" width="1" height="1" fill="#343a40" />
    <rect x="18" y="5" width="1" height="1" fill="#adb5bd" />
    <rect x="7" y="11" width="1" height="5" fill="#343a40" />
    <rect x="9" y="11" width="1" height="3" fill="#6c757d" />
    <rect x="13" y="11" width="1" height="3" fill="#6c757d" />
    <rect x="15" y="11" width="1" height="5" fill="#343a40" />
  </g>

  <!-- FRAME 2 -->
  <g transform="translate(24,0)">
    <rect x="2" y="4" width="2" height="2" fill="#000000" />
    <rect x="1" y="2" width="2" height="2" fill="#000000" />
    <rect x="6" y="7" width="10" height="4" fill="#343a40" />
    <rect x="7" y="8" width="8" height="2" fill="#000000" />
    <rect x="15" y="4" width="5" height="5" fill="#343a40" />
    <rect x="16" y="5" width="3" height="3" fill="#000000" />
    <rect x="15" y="3" width="1" height="1" fill="#343a40" />
    <rect x="19" y="3" width="1" height="1" fill="#343a40" />
    <rect x="18" y="5" width="1" height="1" fill="#adb5bd" />
    <rect x="7" y="11" width="1" height="4" fill="#6c757d" />
    <rect x="9" y="11" width="1" height="4" fill="#343a40" />
    <rect x="13" y="11" width="1" height="4" fill="#343a40" />
    <rect x="15" y="11" width="1" height="4" fill="#6c757d" />
  </g>

  <!-- FRAME 3 -->
  <g transform="translate(48,0)">
    <rect x="2" y="5" width="2" height="2" fill="#000000" />
    <rect x="1" y="3" width="2" height="2" fill="#000000" />
    <rect x="6" y="6" width="10" height="4" fill="#343a40" />
    <rect x="7" y="7" width="8" height="2" fill="#000000" />
    <rect x="15" y="4" width="5" height="5" fill="#343a40" />
    <rect x="16" y="5" width="3" height="3" fill="#000000" />
    <rect x="14" y="3" width="1" height="1" fill="#343a40" />
    <rect x="20" y="3" width="1" height="1" fill="#343a40" />
    <rect x="18" y="5" width="1" height="1" fill="#adb5bd" />
    <rect x="7" y="10" width="1" height="3" fill="#6c757d" />
    <rect x="9" y="10" width="1" height="5" fill="#343a40" />
    <rect x="13" y="10" width="1" height="5" fill="#343a40" />
    <rect x="15" y="10" width="1" height="3" fill="#6c757d" />
  </g>

  <!-- FRAME 4 -->
  <g transform="translate(72,0)">
    <rect x="2" y="4" width="2" height="2" fill="#000000" />
    <rect x="1" y="2" width="2" height="2" fill="#000000" />
    <rect x="6" y="7" width="10" height="4" fill="#343a40" />
    <rect x="7" y="8" width="8" height="2" fill="#000000" />
    <rect x="15" y="4" width="5" height="5" fill="#343a40" />
    <rect x="16" y="5" width="3" height="3" fill="#000000" />
    <rect x="15" y="3" width="1" height="1" fill="#343a40" />
    <rect x="19" y="3" width="1" height="1" fill="#343a40" />
    <rect x="18" y="5" width="1" height="1" fill="#adb5bd" />
    <rect x="7" y="11" width="1" height="5" fill="#343a40" />
    <rect x="9" y="11" width="1" height="3" fill="#6c757d" />
    <rect x="13" y="11" width="1" height="3" fill="#6c757d" />
    <rect x="15" y="11" width="1" height="5" fill="#343a40" />
  </g>

  <!-- FRAME 5 (tail raised) -->
  <g transform="translate(96,0)">
    <rect x="2" y="3" width="2" height="2" fill="#000000" />
    <rect x="2" y="1" width="2" height="2" fill="#000000" />
    <rect x="6" y="6" width="10" height="4" fill="#343a40" />
    <rect x="7" y="7" width="8" height="2" fill="#000000" />
    <rect x="15" y="4" width="5" height="5" fill="#343a40" />
    <rect x="16" y="5" width="3" height="3" fill="#000000" />
    <rect x="14" y="3" width="1" height="1" fill="#343a40" />
    <rect x="20" y="3" width="1" height="1" fill="#343a40" />
    <rect x="18" y="5" width="1" height="1" fill="#adb5bd" />
    <rect x="7" y="10" width="1" height="3" fill="#6c757d" />
    <rect x="9" y="10" width="1" height="5" fill="#343a40" />
    <rect x="13" y="10" width="1" height="5" fill="#343a40" />
    <rect x="15" y="10" width="1" height="3" fill="#6c757d" />
  </g>

  <!-- FRAME 6 (return transition) -->
  <g transform="translate(120,0)">
    <rect x="2" y="4" width="2" height="2" fill="#000000" />
    <rect x="1" y="2" width="2" height="2" fill="#000000" />
    <rect x="6" y="7" width="10" height="4" fill="#343a40" />
    <rect x="7" y="8" width="8" height="2" fill="#000000" />
    <rect x="15" y="4" width="5" height="5" fill="#343a40" />
    <rect x="16" y="5" width="3" height="3" fill="#000000" />
    <rect x="15" y="3" width="1" height="1" fill="#343a40" />
    <rect x="19" y="3" width="1" height="1" fill="#343a40" />
    <rect x="18" y="5" width="1" height="1" fill="#adb5bd" />
    <rect x="7" y="11" width="1" height="4" fill="#6c757d" />
    <rect x="9" y="11" width="1" height="4" fill="#343a40" />
    <rect x="13" y="11" width="1" height="4" fill="#343a40" />
    <rect x="15" y="11" width="1" height="4" fill="#6c757d" />
  </g>
</svg>
